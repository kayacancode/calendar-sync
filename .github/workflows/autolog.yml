name: calendar-sync autolog

on:
  schedule:
    - cron: "0 7 * * *"    # daily ~07:00 UTC
  workflow_dispatch: {}

concurrency:
  group: calendar-sync-autolog
  cancel-in-progress: false

jobs:
  autolog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e . --quiet

      - name: Materialize credentials from secrets
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
          ACCOUNT_PERSONAL: ${{ secrets.ACCOUNT_PERSONAL }}
          ACCOUNT_FOREVER22: ${{ secrets.ACCOUNT_FOREVER22 }}
          ACCOUNT_BETAWORKS: ${{ secrets.ACCOUNT_BETAWORKS }}
          ACCOUNT_ANDUS: ${{ secrets.ACCOUNT_ANDUS }}
        run: |
          printf '%s' "$CREDENTIALS_JSON" > credentials.json
          printf '%s' "$CONFIG_YAML" > config.yaml
          mkdir -p accounts
          printf '%s' "$ACCOUNT_PERSONAL"  > accounts/personal.json
          printf '%s' "$ACCOUNT_FOREVER22" > accounts/forever22.json
          printf '%s' "$ACCOUNT_BETAWORKS" > accounts/betaworks.json
          printf '%s' "$ACCOUNT_ANDUS"     > accounts/andus.json

      - name: Autolog
        env:
          FOREVER22_DB_URL: ${{ secrets.FOREVER22_DB_URL }}
        run: |
          if f22 autolog --lookback-days 35 > autolog-output.txt 2>&1; then
            echo "autolog ok ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
          else
            echo "AUTOLOG FAILED:"
            cat autolog-output.txt
            exit 1
          fi

      - name: Refresh unified calendar
        env:
          FOREVER22_DB_URL: ${{ secrets.FOREVER22_DB_URL }}
        run: |
          if f22 aggregate --refresh > aggregate-output.txt 2>&1; then
            echo "aggregate refresh ok ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
          else
            echo "AGGREGATE REFRESH FAILED:"
            cat aggregate-output.txt
            exit 1
          fi
